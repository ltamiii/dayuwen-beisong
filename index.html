<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学语文背诵默写题生成器</title>
<style>
  :root {
    --sidebar-w: 300px;
    --bg: #f5f0e8;
    --card-bg: #fffef9;
    --text: #3e3232;
    --text-light: #6b5e5e;
    --accent: #8b4513;
    --accent-light: #a0522d;
    --border: #d4c5b2;
    --blank: #c0392b;
    --highlight: #fff3cd;
    --highlight-strong: #ffc107;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Serif SC", "Songti SC", "SimSun", "STSong", serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    line-height: 1.8;
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: var(--sidebar-w);
    background: #3e3232;
    color: #f0e6d3;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
    overflow-y: auto;
    box-shadow: 2px 0 16px rgba(0,0,0,0.15);
  }
  #sidebar h1 { font-size: 1.1rem; text-align: center; padding: 20px 16px 14px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.12); font-weight: 700; }
  #sidebar .subtitle { text-align: center; font-size: 0.72rem; color: #b8a99a; padding: 0 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #text-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  #text-list .item { display: block; width: 100%; padding: 10px 18px; border: none; background: transparent; color: #c4b8a8; font-size: 0.88rem; text-align: left; cursor: pointer; font-family: inherit; transition: all 0.15s; border-left: 3px solid transparent; }
  #text-list .item:hover { background: rgba(255,255,255,0.06); color: #f0e6d3; }
  #text-list .item.active { background: rgba(139,69,19,0.3); color: #fff; border-left-color: #c89460; font-weight: 700; }
  #text-list .item .author { font-size: 0.7rem; color: #9a8a7a; display: block; margin-top: 1px; }
  #text-list .item.active .author { color: #c89460; }

  #controls { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  #controls label { display: block; font-size: 0.76rem; color: #b8a99a; margin-bottom: 4px; }
  .mode-switch { display: flex; gap: 0; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; }
  .mode-switch button { flex: 1; padding: 8px 0; border: none; font-size: 0.8rem; cursor: pointer; font-family: inherit; color: #b8a99a; background: transparent; transition: all 0.15s; }
  .mode-switch button.active { background: var(--accent); color: #fff; font-weight: 700; }

  .diff-group { margin-bottom: 10px; }
  .diff-group .label { font-size: 0.76rem; color: #b8a99a; display: block; margin-bottom: 4px; }
  .diff-btns { display: flex; gap: 0; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; }
  .diff-btns button { flex: 1; padding: 6px 0; border: none; font-size: 0.76rem; cursor: pointer; font-family: inherit; color: #b8a99a; background: transparent; transition: all 0.15s; }
  .diff-btns button.active { background: #6b4e3d; color: #f0e6d3; font-weight: 700; }

  #btn-regenerate { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #c89460; font-size: 0.83rem; cursor: pointer; font-family: inherit; border-radius: 6px; margin-top: 8px; transition: all 0.15s; }
  #btn-regenerate:hover { background: rgba(200,148,96,0.15); }
  #quiz-hint { font-size: 0.7rem; color: #8a7a6a; text-align: center; margin-top: 4px; }

  /* ===== MAIN ===== */
  #main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 28px; max-width: 1100px; width: 100%; }

  .art-header { margin-bottom: 20px; }
  .art-header h2 { font-size: 1.5rem; margin-bottom: 2px; letter-spacing: 1px; }
  .art-header .meta { font-size: 0.82rem; color: var(--text-light); }
  .art-header .divider { width: 50px; height: 3px; background: var(--accent); margin-top: 8px; border-radius: 2px; }

  /* ===== STUDY MODE: two columns ===== */
  .study-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 900px) { .study-grid { grid-template-columns: 1fr; } }

  .study-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
  .study-panel h3 { font-size: 0.95rem; color: var(--accent); padding: 14px 18px 10px; border-bottom: 1px dashed var(--border); letter-spacing: 1px; position: sticky; top: 0; background: var(--card-bg); z-index: 2; }
  .study-panel .panel-body { padding: 14px 18px; overflow-y: auto; flex: 1; }

  /* Original text panel */
  .orig-text { font-size: 1.05rem; line-height: 2.3; }
  .orig-text p { text-indent: 2em; margin-bottom: 10px; position: relative; }
  .orig-text ruby { ruby-align: center; }
  .orig-text rt { font-size: 0.52rem; color: #8b4513; }

  /* Clickable sentence (for translation) */
  .sentence { cursor: pointer; transition: background 0.12s; border-radius: 3px; padding: 0 1px; display: inline; }
  .sentence:hover { background: rgba(139,69,19,0.06); }
  .sentence.has-trans { border-bottom: 1px dotted #c89460; }

  /* Clickable annotation term */
  .anno-term { cursor: pointer; border-bottom: 1.5px dashed var(--accent-light); transition: all 0.12s; position: relative; }
  .anno-term:hover { background: rgba(139,69,19,0.1); }
  .anno-term.flash { background: var(--highlight-strong); border-radius: 2px; transition: background 0.05s; }

  /* Translation popup below sentence */
  .trans-popup { display: none; font-size: 0.85rem; color: #5a4a3a; background: #faf6ee; border-left: 3px solid #c89460; padding: 8px 12px; margin: 4px 0 4px 1em; border-radius: 0 6px 6px 0; line-height: 1.7; }
  .trans-popup.show { display: block; }
  .trans-popup .trans-label { font-size: 0.7rem; color: #a08060; margin-right: 6px; }

  /* Annotations panel */
  .anno-list {}
  .anno-item { padding: 8px 10px; border-bottom: 1px solid #ece3d5; border-radius: 4px; transition: all 0.3s; cursor: default; }
  .anno-item:last-child { border-bottom: none; }
  .anno-item .anno-term { font-weight: 700; color: var(--accent); font-size: 0.9rem; }
  .anno-item .anno-def { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; display: block; }
  .anno-item.highlight { background: var(--highlight); border-radius: 6px; box-shadow: 0 0 0 3px var(--highlight); }
  .anno-item.flash { background: var(--highlight-strong); transition: background 0.05s; }

  /* Bottom sections */
  .bottom-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .bottom-sections { grid-template-columns: 1fr; } }
  .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
  .info-card h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); letter-spacing: 1px; }
  .info-card p { font-size: 0.88rem; line-height: 1.85; }

  /* ===== QUIZ MODE ===== */
  .quiz-text { font-size: 1.15rem; line-height: 2.4; letter-spacing: 1px; }
  .quiz-text p { text-indent: 2em; margin-bottom: 12px; }
  .blank { color: var(--blank); font-weight: 700; letter-spacing: 1px; }
  .blank .answer-reveal { color: var(--blank); font-weight: 700; background: #fff3cd; padding: 1px 2px; border-radius: 3px; }
  .hidden-answer { display: none; }
  .shown { display: inline; }

  #btn-show-answers { display: inline-block; padding: 9px 20px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 0.88rem; cursor: pointer; font-family: inherit; border-radius: 6px; margin-bottom: 14px; transition: all 0.15s; }
  #btn-show-answers:hover { background: var(--accent); color: #fff; }
  #btn-show-answers.showing { background: var(--accent); color: #fff; }
  .quiz-stats { font-size: 0.78rem; color: var(--text-light); margin-bottom: 10px; }

  /* ===== MOBILE TOP BAR ===== */
  #mobile-bar {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    background: #3e3232; color: #f0e6d3;
    padding: 10px 14px;
    align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #mobile-bar .bar-title {
    font-size: 1rem; font-weight: 700; letter-spacing: 1px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #btn-menu {
    background: none; border: none; color: #f0e6d3; font-size: 1.4rem;
    cursor: pointer; padding: 4px 6px; line-height: 1;
  }

  /* ===== BACKDROP ===== */
  #backdrop {
    display: none;
    position: fixed; inset: 0; z-index: 25;
    background: rgba(0,0,0,0.5);
  }
  #backdrop.show { display: block; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    #mobile-bar { display: flex; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 30;
      width: 280px; max-width: 85vw;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar h1 { font-size: 1rem; padding: 12px 14px 8px; }
    #sidebar .subtitle { padding: 0 14px 10px; font-size: 0.68rem; }
    #text-list { flex: 1; overflow-y: auto; }
    #text-list .item { padding: 9px 14px; font-size: 0.85rem; }
    #controls { padding: 10px 14px; }
    #main { margin-left: 0; padding: 50px 10px 14px; }
    .study-grid { grid-template-columns: 1fr; }
    .bottom-sections { grid-template-columns: 1fr; }
    .orig-text { font-size: 0.95rem; }
    .quiz-text { font-size: 1rem; }
  }

  .fade { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0.4; } to { opacity: 1; } }
  @keyframes flashBg { 0%{background:var(--highlight-strong)} 100%{background:transparent} }
</style>
</head>
<body>

<!-- Mobile top bar -->
<div id="mobile-bar">
  <button id="btn-menu" onclick="toggleSidebar()" aria-label="菜单">☰</button>
  <span class="bar-title" id="bar-title">大学语文背诵</span>
</div>
<!-- Backdrop overlay -->
<div id="backdrop" onclick="closeSidebar()"></div>
<aside id="sidebar">
  <h1>大学语文背诵</h1>
  <div class="subtitle">默写题生成器</div>
  <nav id="text-list"></nav>
  <div id="controls">
    <label>模式</label>
    <div class="mode-switch">
      <button id="mode-study" class="active">📖 学习</button>
      <button id="mode-quiz">✏️ 默写</button>
    </div>
    <div class="diff-group" id="diff-group" style="display:none">
      <span class="label">难度</span>
      <div class="diff-btns">
        <button data-diff="easy" class="active">简单</button>
        <button data-diff="medium">中等</button>
        <button data-diff="hard">困难</button>
      </div>
    </div>
    <button id="btn-regenerate" style="display:none">🔄 重新生成</button>
    <div id="quiz-hint" style="display:none">按 R 键快速重新生成</div>
  </div>
</aside>

<main id="main"></main>

<script>
// ===================================================================
// DATA
// ===================================================================
// Each sentence: { text, ruby:[{c, p, annoIdx?}], trans? }
// ruby.annoIdx links to the annotations array index

const texts = [

// ==================== 1 ====================
{
  id:1, title:'王国维纪念碑碑文', author:'陈寅恪',
  background:'1927年6月2日，国学大师王国维自沉于颐和园昆明湖。两年后，清华大学为其立碑，陈寅恪撰写此碑文。陈寅恪不将王国维之死视为"殉清"，而是将其提升到"独立之精神，自由之思想"的高度，使之成为中国现代知识分子精神独立的不朽宣言。',
  centralIdea:'文章以"独立之精神，自由之思想"为核心，论证读书治学的终极目的是摆脱世俗束缚、追求真理。作者将王国维之死阐释为以生命捍卫思想自由的典范，而非个人恩怨或王朝兴亡所能解释，从而赋予这一历史事件以超越时代的永恒价值。',
  paragraphs:[
   {sentences:[
     {text:'其词曰：士之读书治学，', trans:'碑文说：读书人做学问，'},
     {text:'盖将以脱心志于俗谛', ruby:[{c:'谛',p:'dì',annoIdx:0}], trans:'是为了让心灵从世俗偏见的枷锁中挣脱出来，'},
     {text:'之桎梏', ruby:[{c:'桎梏',p:'zhì gù',annoIdx:1}], trans:''},
     {text:'，真理因得以发扬。', trans:'使真理得以发扬光大。'},
     {text:'思想而不自由，', ruby:[{c:'毋宁',p:'wú nìng',annoIdx:7}], trans:'如果不能自由地思想，还不如死去。'},
     {text:'毋宁死耳。', trans:''},
     {text:'斯古今仁圣同殉', ruby:[{c:'殉',p:'xùn',annoIdx:2}], trans:'这是古今仁人志士共同为之献身的精义，'},
     {text:'之精义，夫岂', ruby:[{c:'庸鄙',p:'yōng bǐ',annoIdx:8}], trans:'哪里是平庸浅陋之人所能理解的。'},
     {text:'庸鄙之敢望。', trans:''},
     {text:'先生以一死见其独立自由之意志，非所论于一人之恩怨，一姓之兴亡。', trans:'先生用他的死彰显了独立自由的意志，这不是关乎个人恩怨、王朝兴衰的事。'},
     {text:'呜呼！', trans:'唉！'},
     {text:'树兹', ruby:[{c:'兹',p:'zī',annoIdx:3}], trans:'在校园中树立此碑，'},
     {text:'石于讲舍，系哀思而不忘。', trans:'寄托哀思永不忘记。'},
     {text:'表哲人之奇节，诉', ruby:[{c:'真宰',p:'zhēn zǎi',annoIdx:4}], trans:'彰显哲人的奇节，向茫茫上苍诉说。'},
     {text:'真宰之茫茫。', trans:''},
     {text:'来世不可知者也，先生之著述，或有时而不章。', trans:'未来不可预知，先生的著作或许有朝一日不再流行。'},
     {text:'先生之学说，或有时而可商。', trans:'先生的学说或许有朝一日可以商榷。'},
     {text:'惟此独立之精神，自由之思想，历千万祀', ruby:[{c:'祀',p:'sì',annoIdx:5}], trans:'唯有这独立的精神、自由的思想，历经千万年，'},
     {text:'，与天壤而同久，共', ruby:[{c:'三光',p:'sān guāng',annoIdx:6}], trans:'与天地一样长久，与日月星辰一同永放光芒。'},
     {text:'三光而永光。', trans:''}
   ]}
  ],
  annotations:[
   {t:'俗谛',m:'佛教术语，与"真谛"相对，指世俗的、表面的道理或价值标准。此处指世俗偏见和功利的思维定式。'},
   {t:'桎梏',m:'古代刑具，脚镣（桎）和手铐（梏）。比喻束缚人思想的枷锁。'},
   {t:'仁圣同殉',m:'古往今来的仁人志士共同为之献身的精义。"殉"指为理想献出生命。'},
   {t:'树兹石于讲舍',m:'在校园（清华大学）中树立此碑。"兹"即"此"，"讲舍"指讲堂校舍。'},
   {t:'真宰',m:'宇宙的主宰，即天、造物主。语出《庄子》。'},
   {t:'千万祀',m:'千万年。"祀"是殷商时期的纪年单位。'},
   {t:'三光',m:'日、月、星。'},
   {t:'毋宁',m:'不如。"思想而不自由，毋宁死耳"——如果不能自由思想，还不如死去。'},
   {t:'庸鄙',m:'平庸浅陋之人。'}
  ]
},

// ==================== 2 ====================
{
  id:2, title:'兰亭集序', author:'王羲之',
  background:'东晋永和九年（公元353年）三月三日上巳节，王羲之与谢安、孙绰等41位名士在会稽山阴兰亭举行修禊雅集。众人曲水流觞、饮酒赋诗，后将诗作汇编成集，王羲之为之作序并亲笔书写，即千古第一行书《兰亭集序》。此文既是书法瑰宝，也是哲理深远的文学杰作。',
  centralIdea:'文章前半部分写兰亭宴集的自然之美与友朋之乐，充满生命的欢愉；后半部分急转直下，由乐生悲，感叹人生短暂、世事无常，并对庄子"一死生""齐彭殇"的虚无主义提出批判。全文以"乐—痛—悲"三重情感递进，展现了对生命有限性的深刻体认和对超越性精神价值的追求。',
  paragraphs:[
   {sentences:[
     {text:'永和九年，岁在癸', ruby:[{c:'癸',p:'guǐ'}], trans:'永和九年，这年是癸丑年，'},
     {text:'丑，暮春之初，会于会稽', ruby:[{c:'会稽',p:'kuài jī'}], trans:'暮春三月初，我们在会稽郡'},
     {text:'山阴之兰亭，修禊', ruby:[{c:'禊',p:'xì',annoIdx:0}], trans:'山阴县的兰亭聚会，举行修禊仪式。'},
     {text:'事也。', trans:''},
     {text:'群贤毕至，少长咸集。', trans:'众多贤士都来了，年轻的年长的都聚在一起。'},
     {text:'此地有崇山峻岭，茂林修竹；', trans:'这里有高耸的山岭，茂密的树林和修长的竹子；'},
     {text:'又有清流激湍', ruby:[{c:'湍',p:'tuān'}], trans:'又有清澈湍急的溪流，'},
     {text:'，映带左右，引以为流觞', ruby:[{c:'觞',p:'shāng',annoIdx:1}], trans:'辉映环绕在左右，我们引溪水作为流觞的曲水，'},
     {text:'曲水，列坐其次。', trans:'大家依次排列坐在水边。'},
     {text:'虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。', trans:'虽然没有丝竹管弦的盛大排场，但喝一杯酒、吟一首诗，也足以畅叙内心深处的情怀。'}
   ]},
   {sentences:[
     {text:'是日也，天朗气清，惠风和畅。', trans:'这一天，天空晴朗、空气清新，温和的风吹来，令人舒畅。'},
     {text:'仰观宇宙之大，俯察品类之盛，所以游目骋', ruby:[{c:'骋',p:'chěng'}], trans:'抬头看宇宙的广阔，低头看万物的繁盛，'},
     {text:'怀，足以极视听之娱，信可乐也。', trans:'放眼远望、舒展胸怀，足以让视觉和听觉享受达到极致，确实是令人快乐的。'}
   ]},
   {sentences:[
     {text:'夫人之相与，俯仰一世，', trans:'人与人相处，在低头抬头之间就过完了一生，'},
     {text:'或取诸怀抱，晤', ruby:[{c:'晤',p:'wù'}], trans:'有的人倾吐内心的志向抱负，'},
     {text:'言一室之内；', trans:'在室内与朋友畅谈；'},
     {text:'或因寄所托，放浪形骸', ruby:[{c:'骸',p:'hái'}], trans:'有的人则寄托情怀，'},
     {text:'之外。', trans:'放纵自身于世俗礼法之外。'},
     {text:'虽趣舍万殊，静躁不同，', trans:'虽然每个人的取舍千差万别，性情有安静有躁动，'},
     {text:'当其欣于所遇，暂得于己，快然自足，不知老之将至。', trans:'但当他们对所遇到的事物感到欣喜时，暂时得到了满足，快乐自得，竟然忘记了衰老即将到来。'},
     {text:'及其所之既倦，情随事迁，感慨系之矣。', trans:'等到他们对所追求的事物感到厌倦，情感随着境遇的变化而改变，感慨也就随之而来了。'},
     {text:'向之所欣，俛', ruby:[{c:'俛',p:'fǔ'}], trans:'从前所喜欢的事物，'},
     {text:'仰之间，已为陈迹，犹不能不以之兴怀。', trans:'转眼之间已经成了往事，尚且不能不因此而引发感慨。'},
     {text:'况修短随化，终期于尽。', trans:'更何况人的寿命长短听凭造化安排，终究都有完结的一天。'},

// ==================== 5 ====================
{
  id:5, title:'与元九书', author:'白居易',
  background:'《与元九书》是白居易写给好友元稹（排行第九）的一封长篇书信，是中国文学批评史上的重要文献。信中系统阐述了白居易的诗歌理论——"文章合为时而著，歌诗合为事而作"，提出"根情、苗言、华声、实义"的诗学体系。本文背诵的是开篇论"文"与"诗"之本源的部分。',
  centralIdea:'白居易以"三才各有文"立论，追溯"文"的宇宙本源，进而论证诗歌的本质结构——情为根、言为苗、声为花、义为果。他强调诗歌的社会功能：圣人通过诗歌感人心、致太平，"言者无罪，闻者足戒"成为中国古代最开明的文艺政策宣言。全文逻辑严密，层层递进，是儒家诗教的经典表述。',
  paragraphs:[
   {sentences:[

     {text:'地之文，五材首之；', trans:'地的文，以金木水火土五材为首；'},
     {text:'人之文，六经首之。', trans:'人的文，以《诗》《书》《礼》《乐》《易》《春秋》六经为首。'},
     {text:'就六经言，《诗》又首之。', trans:'就六经而言，《诗经》又排在首位。'},
     {text:'何者？圣人感人心而天下和平。', trans:'为什么呢？因为圣人通过感动人心而使天下和平。'},
     {text:'感人心者，莫先乎情，莫始乎言，莫切乎声，莫深乎义。', trans:'能感动人心的，没有比情感更优先的，没有比语言更直接的，没有比声律更切近的，没有比义理更深刻的。'},
     {text:'诗者，根情，苗言，华声，实义。', trans:'所谓诗，情感是它的根，语言是它的苗，声律是它的花，义理是它的果实。'},
     {text:'上自圣贤，下至愚騃', ruby:[{c:'騃',p:'ái'}], trans:'上至圣贤，下至愚笨之人，'},
     {text:'，微及豚', ruby:[{c:'豚',p:'tún'}], trans:'微小到猪和鱼，'},
     {text:'鱼，幽及鬼神；', trans:'幽深到鬼神；'},
     {text:'群分而气同，形异而情一。', trans:'种类不同但气质相通，形态各异但情感一致。'},

   ]},
   {sentences:[
     {text:'圣人知其然，因其言，经之以六义；', trans:'圣人明白这个道理，就根据语言，用风雅颂赋比兴六义来组织它；'},

     {text:'音有韵，义有类。', trans:'声音有韵律，义理有类别。'},
     {text:'韵协则言顺，言顺则声易入；', trans:'韵律和谐则语言顺畅，语言顺畅则声音容易入耳；'},
     {text:'类举则情见', ruby:[{c:'见',p:'xiàn'}], trans:'义类恰当则情感显现，'},
     {text:'，情见则感易交。', trans:'情感显现则感动容易交流。'},
     {text:'于是乎孕大含深，贯微洞密，上下通而一气泰，忧乐合而百志熙', ruby:[{c:'熙',p:'xī'}], trans:'于是诗歌包含宏大的内容、洞察幽微的道理，天地上下通畅、万物之气和泰，忧乐和谐、百姓的心意和乐。'},

let currentTextIdx = 0;
let currentMode = 'study';
let currentDifficulty = 'easy';
let blankedParas = null;
let showAnswers = false;

// ===================================================================
// HELPERS
// ===================================================================
const DIFFICULTY_RATIOS = { easy: 0.35, medium: 0.50, hard: 0.70 };

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function meaningfulChars(text) {
  return text.replace(/[，。！？；、：""''《》（）「」『』【】\s\d]/g, '').length;
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ===================================================================
// BLANKING: punctuation-preserving
// ===================================================================
function generateBlanks(text, difficulty) {
  const ratio = DIFFICULTY_RATIOS[difficulty];
  const seed = Date.now() + Math.floor(Math.random() * 100000);
  const rng = seededRandom(seed);

  const result = text.paragraphs.map(p =>
    p.sentences.map(s => ({ ...s, blanked: false, _blankable: meaningfulChars(s.text) >= 3 }))
  );

  for (let pi = 0; pi < result.length; pi++) {
    const sentences = result[pi];
    const blankable = [];
    for (let i = 0; i < sentences.length; i++) {
      if (sentences[i]._blankable) blankable.push(i);
    }
    if (blankable.length === 0) continue;

    let blankCount = Math.floor(blankable.length * ratio);
    if (blankCount === 0 && blankable.length >= 3 && ratio >= 0.35) blankCount = 1;
    blankCount = Math.min(blankCount, Math.max(0, blankable.length - 1));
    if (blankCount <= 0) continue;

    const shuffled = [...blankable];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    for (let k = 0; k < blankCount; k++) {
      sentences[shuffled[k]].blanked = true;
    }
  }

  for (const para of result) {
    for (const s of para) delete s._blankable;
  }
  return result;
}

/** Render a sentence with ruby, optionally blanked. When blanked, replaces Chinese chars with ＿, keeps punctuation. */
function renderSentenceHTML(s, showAnswer) {
  if (!s.blanked) {
    return renderRubyHTML(s.text, s.ruby || []);
  }
  if (showAnswer) {
    return '<span class="blank answer-reveal">' + renderRubyHTML(s.text, s.ruby || []) + '</span>';
  }
  var result = '';
  for (var i = 0; i < s.text.length; i++) {
    var ch = s.text[i];
    if (/[一-鿿㐀-䶿]/.test(ch)) {
      result += '＿';
    } else {
      result += ch;
    }
  }
  return '<span class="blank">' + escapeHTML(result) + '</span>';
}

function renderRubyHTML(text, rubies) {
  if (!rubies || rubies.length === 0) return escapeHTML(text);
  var html = '';
  var remaining = text;
  for (var ri = 0; ri < rubies.length; ri++) {
    var r = rubies[ri];
    var idx = remaining.indexOf(r.c);
    if (idx === -1) continue;
    html += escapeHTML(remaining.substring(0, idx));
    var extraAttrs = r.annoIdx !== undefined ? ' data-anno="' + r.annoIdx + '" class="anno-term" onclick="event.stopPropagation();highlightAnnotation(' + r.annoIdx + ')" title="点击查看注释"' : '';
    html += '<ruby' + extraAttrs + '>' + escapeHTML(r.c) + '<rt>' + escapeHTML(r.p) + '</rt></ruby>';
    remaining = remaining.substring(idx + r.c.length);
  }
  html += escapeHTML(remaining);
  return html;
}

// ===================================================================
// RENDER: STUDY MODE
// ===================================================================
function renderStudyMode(text) {
  var main = document.getElementById('main');
  var html = '';

  html += '<div class="art-header fade">';
  html += '<h2>' + escapeHTML(text.title) + '</h2>';
  html += '<div class="meta">' + escapeHTML(text.author) + '</div>';
  html += '<div class="divider"></div>';
  html += '</div>';

  // Two columns
  html += '<div class="study-grid fade">';

  // LEFT: original text
  html += '<div class="study-panel">';
  html += '<h3>📜 原文 <span style="font-weight:400;font-size:0.7rem;color:#a08060;">（点击词句查看注释/翻译）</span></h3>';
  html += '<div class="panel-body orig-text" id="orig-text-panel">';
  for (var pi = 0; pi < text.paragraphs.length; pi++) {
    html += '<p data-para="' + pi + '">';
    var sentences = text.paragraphs[pi].sentences;
    for (var si = 0; si < sentences.length; si++) {
      var s = sentences[si];
      var hasTrans = s.trans && s.trans.length > 0;
      html += '<span class="sentence' + (hasTrans ? ' has-trans' : '') + '" data-para="' + pi + '" data-si="' + si + '"' + (hasTrans ? ' onclick="event.stopPropagation();toggleTranslation(this)" title="点击查看翻译"' : '') + '>';
      html += renderRubyHTML(s.text, s.ruby || []);
      html += '</span>';
    }
    html += '</p>';
  }
  html += '</div></div>';

  // RIGHT: annotations
  html += '<div class="study-panel">';
  html += '<h3>📝 注释</h3>';
  html += '<div class="panel-body anno-list" id="anno-panel">';
  for (var ai = 0; ai < text.annotations.length; ai++) {
    var a = text.annotations[ai];
    html += '<div class="anno-item" id="anno-' + ai + '" data-anno="' + ai + '">';
    html += '<span class="anno-term">' + escapeHTML(a.t) + '</span>';
    html += '<span class="anno-def">' + escapeHTML(a.m) + '</span>';
    html += '</div>';
  }
  html += '</div></div>';

  html += '</div>'; // end study-grid

  // Bottom cards
  html += '<div class="bottom-sections fade">';
  html += '<div class="info-card"><h3>📖 文章背景</h3><p>' + escapeHTML(text.background) + '</p></div>';
  html += '<div class="info-card"><h3>💡 中心思想</h3><p>' + escapeHTML(text.centralIdea) + '</p></div>';
  html += '</div>';

  main.innerHTML = html;
}

// ===================================================================
// INTERACTIONS
// ===================================================================
function highlightAnnotation(idx) {
  var text = texts[currentTextIdx];
  if (idx < 0 || idx >= text.annotations.length) return;

  // Flash all matching terms in text
  var terms = document.querySelectorAll('.anno-term[data-anno="' + idx + '"]');
  for (var i = 0; i < terms.length; i++) {
    terms[i].classList.add('flash');
    setTimeout((function(el) { return function() { el.classList.remove('flash'); }; })(terms[i]), 800);
  }

  // Scroll to annotation
  var annoEl = document.getElementById('anno-' + idx);
  if (annoEl) {
    annoEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    annoEl.classList.add('flash');
    setTimeout(function() { annoEl.classList.remove('flash'); }, 1500);
  }
}

function toggleTranslation(el) {
  var pi = parseInt(el.dataset.para);
  var si = parseInt(el.dataset.si);
  var text = texts[currentTextIdx];
  var para = text.paragraphs[pi];
  if (!para) return;
  var s = para.sentences[si];
  if (!s || !s.trans || s.trans.length === 0) return;

  // Remove any existing inline translation in this paragraph
  var paraEl = el.closest('p');
  if (!paraEl) return;
  var existing = paraEl.parentNode.querySelector('.trans-inline');
  if (existing && existing.dataset.si === String(si)) {
    existing.remove();
    return;
  }
  if (existing) existing.remove();

  // Create translation element
  var transDiv = document.createElement('div');
  transDiv.className = 'trans-inline';
  transDiv.dataset.si = si;
  transDiv.style.cssText = 'font-size:0.82rem;color:#5a4a3a;background:#faf6ee;border-left:3px solid #c89460;padding:6px 10px;margin:2px 0 6px 1em;border-radius:0 5px 5px 0;line-height:1.7;text-indent:0;';
  transDiv.innerHTML = '<span style="font-size:0.68rem;color:#a08060;">💬 译文：</span>' + escapeHTML(s.trans);
  paraEl.parentNode.insertBefore(transDiv, paraEl.nextSibling);
}

// ===================================================================
// RENDER: QUIZ MODE
// ===================================================================
function renderQuizMode(text, paras) {
  var main = document.getElementById('main');
  var totalSentences = 0, blankedCount = 0, totalChars = 0, blankedChars = 0;
  for (var pi = 0; pi < paras.length; pi++) {
    for (var si = 0; si < paras[pi].length; si++) {
      totalSentences++;
      if (paras[pi][si].blanked) {
        blankedCount++;
        blankedChars += meaningfulChars(paras[pi][si].text);
      }
      totalChars += meaningfulChars(paras[pi][si].text);
    }
  }

  var html = '';
  html += '<div class="art-header fade">';
  html += '<h2>' + escapeHTML(text.title) + '</h2>';
  html += '<div class="meta">' + escapeHTML(text.author) + ' · 默写题</div>';
  html += '<div class="divider"></div>';
  html += '</div>';

  html += '<div class="quiz-stats fade">共 ' + totalSentences + ' 句，挖空 ' + blankedCount + ' 句 · 约 ' + Math.round(blankedChars/totalChars*100) + '% 字数</div>';
  html += '<button id="btn-show-answers" class="fade" onclick="toggleAnswers()">' + (showAnswers ? '🙈 隐藏答案' : '👁 显示答案') + '</button>';

  html += '<div class="section fade"><div class="quiz-text">';
  for (var pi = 0; pi < paras.length; pi++) {
    html += '<p>';
    for (var si = 0; si < paras[pi].length; si++) {
      html += renderSentenceHTML(paras[pi][si], showAnswers);
    }
    html += '</p>';
  }
  html += '</div></div>';

  main.innerHTML = html;
}

function toggleAnswers() {
  showAnswers = !showAnswers;
  refreshQuiz();
}

function refreshQuiz() {
  renderQuizMode(texts[currentTextIdx], blankedParas);
}

// ===================================================================
// DISPATCH
// ===================================================================
function refreshAll() {
  var text = texts[currentTextIdx];
  if (currentMode === 'study') {
    renderStudyMode(text);
  } else {
    blankedParas = generateBlanks(text, currentDifficulty);
    showAnswers = false;
    renderQuizMode(text, blankedParas);
  }
}

// ===================================================================
// SIDEBAR
// ===================================================================
function buildSidebar() {
  var list = document.getElementById('text-list');
  var html = '';
  texts.forEach(function(t, i) {
    html += '<button class="item' + (i === currentTextIdx ? ' active' : '') + '" data-idx="' + i + '">';
    html += escapeHTML(t.title);
    html += '<span class="author">' + escapeHTML(t.author) + '</span>';
    html += '</button>';
  });
  list.innerHTML = html;

  list.querySelectorAll('.item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentTextIdx = parseInt(this.dataset.idx);
      updateActiveText();
      refreshAll();
    });
  });
}

function updateActiveText() {
  document.querySelectorAll('#text-list .item').forEach(function(btn, i) {
    btn.classList.toggle('active', i === currentTextIdx);
  });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-study').classList.toggle('active', mode === 'study');
  document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('diff-group').style.display = (mode === 'quiz') ? 'block' : 'none';
  document.getElementById('btn-regenerate').style.display = (mode === 'quiz') ? 'block' : 'none';
  document.getElementById('quiz-hint').style.display = (mode === 'quiz') ? 'block' : 'none';
  if (mode === 'quiz') showAnswers = false;
  refreshAll();
}

function setDifficulty(diff) {
  currentDifficulty = diff;
  document.querySelectorAll('.diff-btns button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.diff === diff);
  });
  if (currentMode === 'quiz') {
    blankedParas = generateBlanks(texts[currentTextIdx], currentDifficulty);
    showAnswers = false;
    renderQuizMode(texts[currentTextIdx], blankedParas);
  }
}

function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  var backdrop = document.getElementById('backdrop');
  var isOpen = sidebar.classList.toggle('open');
  if (isOpen) {
    backdrop.classList.add('show');
  } else {
    backdrop.classList.remove('show');
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

// ===================================================================
// INIT
// ===================================================================
function init() {
  buildSidebar();

  document.getElementById('mode-study').addEventListener('click', function() { setMode('study'); });
  document.getElementById('mode-quiz').addEventListener('click', function() { setMode('quiz'); });

  document.querySelectorAll('.diff-btns button').forEach(function(btn) {
    btn.addEventListener('click', function() { setDifficulty(btn.dataset.diff); });
  });

  document.getElementById('btn-regenerate').addEventListener('click', function() {
    if (currentMode === 'quiz') {
      blankedParas = generateBlanks(texts[currentTextIdx], currentDifficulty);
      showAnswers = false;
      renderQuizMode(texts[currentTextIdx], blankedParas);
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey && currentMode === 'quiz') {
      var tag = document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      blankedParas = generateBlanks(texts[currentTextIdx], currentDifficulty);
      showAnswers = false;
      renderQuizMode(texts[currentTextIdx], blankedParas);
    }
  });

  // On mobile, close sidebar when clicking a text item
  document.getElementById('text-list').addEventListener('click', function(e) {
    if (e.target.closest('.item') && window.innerWidth <= 768) {
      setTimeout(closeSidebar, 150);
    }
  });

  refreshAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
